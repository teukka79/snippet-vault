<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Komennot">
<meta name="theme-color" content="#0f0d0a">
<title>Komennot</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0f0d0a;
    --surface:#1a1611;
    --surface-2:#221d17;
    --border:#332b21;
    --text:#ede6d9;
    --text-dim:#8a8070;
    --accent:#e8a33d;
    --accent-bright:#ffcb66;
    --danger:#c0654f;
    --good:#7fc98f;
    --ok:#c9c25f;
    --type-command:#e8a33d;
    --type-username:#6fb3c9;
    --type-password:#c98fe0;
    --radius:14px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{min-height:100%;}
  html{background:var(--bg);}
  body{
    margin:0;
    background: radial-gradient(1200px 600px at 50% -10%, #1c1712 0%, var(--bg) 55%);
    color:var(--text);
    font-family:'Inter',system-ui,sans-serif;
    padding-top:env(safe-area-inset-top);
    padding-bottom:env(safe-area-inset-bottom);
    min-height:100%;
    overscroll-behavior-y:none;
  }
  .wrap{max-width:640px;margin:0 auto;padding:20px 16px 120px;}

  header{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:18px;padding:4px 2px;}
  header h1{
    font-family:'JetBrains Mono',monospace;font-size:20px;font-weight:700;margin:0;letter-spacing:-0.02em;
    display:flex;align-items:center;gap:8px;
  }
  header h1::before{
    content:"";width:9px;height:9px;border-radius:50%;background:var(--accent);
    box-shadow:0 0 8px var(--accent);display:inline-block;
  }

  .search{display:flex;gap:8px;margin-bottom:10px;}
  .search input{
    flex:1;background:var(--surface);border:1px solid var(--border);color:var(--text);
    border-radius:10px;padding:11px 13px;font-family:'JetBrains Mono',monospace;font-size:14px;outline:none;
  }
  .search input::placeholder{color:var(--text-dim);}
  .search input:focus{border-color:var(--accent);}

  .catchips{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:16px;scrollbar-width:none;}
  .catchips::-webkit-scrollbar{display:none;}
  .catchip{
    flex-shrink:0;padding:7px 13px;border-radius:999px;border:1px solid var(--border);background:var(--surface);
    color:var(--text-dim);font-size:12px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;white-space:nowrap;
  }
  .catchip.active{border-color:var(--accent);color:var(--accent-bright);background:rgba(232,163,61,.12);}

  .empty{text-align:center;color:var(--text-dim);padding:60px 20px;font-size:14px;line-height:1.6;}
  .empty b{color:var(--text);}

  .card{
    background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
    padding:14px 14px 12px;margin-bottom:12px;animation:rise .25s ease both;
  }
  .card.dragging{opacity:.45;}
  @keyframes rise{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

  .card-head{display:flex;align-items:flex-start;gap:8px;margin:0 0 8px 0;}
  .draghandle{
    flex-shrink:0;width:24px;height:32px;border:none;background:none;color:var(--text-dim);
    display:flex;align-items:center;justify-content:center;cursor:grab;touch-action:none;opacity:.5;margin-left:-6px;
  }
  .draghandle svg{width:15px;height:15px;}
  .titleblock{flex:1;min-width:0;}
  .card .desc{font-size:13.5px;color:var(--text-dim);margin:0;font-weight:500;line-height:1.4;word-break:break-word;}
  .catbadge{
    display:inline-block;margin-top:4px;font-size:10.5px;color:var(--accent-bright);
    background:rgba(232,163,61,.12);border-radius:6px;padding:2px 7px;font-weight:600;
  }
  .titleedit{display:none;flex-direction:column;gap:6px;}
  .titleedit.active{display:flex;}
  .titleedit input{
    width:100%;background:var(--surface-2);border:1px solid var(--accent);color:var(--text);
    border-radius:7px;padding:7px 8px;font-size:13px;font-family:'Inter',sans-serif;outline:none;
  }
  .titleedit .miniactions{flex-direction:row;}
  .titleblock.editing .desc, .titleblock.editing .catbadge{display:none;}
  .titlebtn{
    flex-shrink:0;width:24px;height:24px;border:none;background:none;color:var(--text-dim);
    cursor:pointer;display:flex;align-items:center;justify-content:center;opacity:.6;
  }
  .titlebtn svg{width:14px;height:14px;}
  .titlebtn:active{opacity:1;}
  .headbtns{display:flex;gap:2px;flex-shrink:0;}

  .cmdrows{display:flex;flex-direction:column;gap:6px;}
  .cmdbox{
    background:var(--surface-2);border:1px solid var(--border);border-radius:10px;
    display:flex;align-items:center;gap:6px;padding:10px 8px 10px 10px;
  }
  .cmdbox.k-username{border-color:#2f4550;}
  .cmdbox.k-password{border-color:#4a3550;}
  .cmdbox.editing{align-items:stretch;padding:8px;flex-direction:column;}
  .cmdbox .editarea{
    flex:1;background:var(--bg);border:1px solid var(--accent);border-radius:8px;color:var(--accent-bright);
    font-family:'JetBrains Mono',monospace;font-size:13px;padding:8px;outline:none;resize:none;min-height:44px;
  }
  .miniactions{display:flex;flex-direction:column;gap:4px;flex-shrink:0;}
  .miniactions button{width:26px;height:26px;border-radius:6px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;}
  .miniactions .ok{background:rgba(232,163,61,.2);color:var(--accent-bright);}
  .miniactions .cancel{background:var(--border);color:var(--text-dim);}
  .miniactions svg{width:13px;height:13px;}

  .kindbadge{flex-shrink:0;width:22px;height:22px;border-radius:7px;display:flex;align-items:center;justify-content:center;}
  .kindbadge svg{width:12px;height:12px;}
  .kindbadge.k-command{background:rgba(232,163,61,.15);color:var(--type-command);}
  .kindbadge.k-username{background:rgba(111,179,201,.15);color:var(--type-username);}
  .kindbadge.k-password{background:rgba(201,143,224,.15);color:var(--type-password);}

  .cmdtext{
    flex:1;min-width:0;font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--accent-bright);
    white-space:nowrap;overflow-x:auto;scrollbar-width:none;padding:2px 0;cursor:pointer;
  }
  .cmdtext::-webkit-scrollbar{display:none;}
  .cmdtext.k-username{color:var(--type-username);}
  .cmdtext.k-password{color:var(--type-password);}
  .cmdtext.masked{letter-spacing:3px;color:var(--text-dim);user-select:none;}

  .eyebtn, .copybtn, .rowbtn{
    flex-shrink:0;width:30px;height:30px;border-radius:8px;border:none;background:transparent;
    color:var(--text-dim);display:flex;align-items:center;justify-content:center;cursor:pointer;
  }
  .copybtn{background:#2a231b;border:1px solid var(--border);}
  .copybtn svg, .eyebtn svg, .rowbtn svg{width:14px;height:14px;}
  .copybtn:active{transform:scale(.9);}
  .copybtn.copied{background:rgba(232,163,61,.18);border-color:var(--accent);color:var(--accent-bright);}
  .rowbtn:active{color:var(--danger);}

  .addrow{
    margin-top:8px;width:100%;padding:9px;border-radius:9px;border:1px dashed var(--border);
    background:transparent;color:var(--text-dim);font-family:'Inter',sans-serif;font-size:12.5px;font-weight:600;
    cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;
  }
  .addrow:active{border-color:var(--accent);color:var(--accent-bright);}
  .addrow svg{width:13px;height:13px;}

  .newrowbox{margin-top:6px;background:var(--surface-2);border:1px solid var(--accent);border-radius:10px;padding:10px;}
  .newrowbox textarea{
    width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--accent-bright);
    font-family:'JetBrains Mono',monospace;font-size:13px;padding:8px;outline:none;resize:none;min-height:44px;box-sizing:border-box;
  }
  .newrowbox .sheet-actions{margin-top:10px;}
  .newrowbox .sheet-actions button{padding:9px;font-size:13px;}

  .kindpicker{display:flex;gap:6px;margin:10px 0 0;}
  .kindpicker button{
    flex:1;padding:9px 4px;border-radius:9px;border:1px solid var(--border);background:var(--surface-2);
    color:var(--text-dim);font-size:11.5px;font-weight:600;display:flex;flex-direction:column;
    align-items:center;gap:4px;cursor:pointer;font-family:'Inter',sans-serif;
  }
  .kindpicker button svg{width:15px;height:15px;}
  .kindpicker button.active[data-kind="command"]{border-color:var(--type-command);color:var(--type-command);background:rgba(232,163,61,.12);}
  .kindpicker button.active[data-kind="username"]{border-color:var(--type-username);color:var(--type-username);background:rgba(111,179,201,.12);}
  .kindpicker button.active[data-kind="password"]{border-color:var(--type-password);color:var(--type-password);background:rgba(201,143,224,.12);}

  .segpicker{display:flex;gap:6px;}
  .segpicker button{
    flex:1;padding:9px 4px;border-radius:9px;border:1px solid var(--border);background:var(--surface-2);
    color:var(--text-dim);font-size:12px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;
  }
  .segpicker button.active{border-color:var(--accent);color:var(--accent-bright);background:rgba(232,163,61,.12);}

  .strengthmeter{margin-top:10px;}
  .strengthmeter.hidden{display:none;}
  .strengthbar{height:5px;border-radius:3px;background:var(--border);overflow:hidden;}
  .strengthbar span{display:block;height:100%;width:0%;border-radius:3px;transition:width .2s ease, background .2s ease;}
  .strengthlabel{font-size:11px;margin-top:5px;font-weight:600;}

  .fab{
    position:fixed;right:20px;bottom:calc(24px + env(safe-area-inset-bottom));
    width:56px;height:56px;border-radius:50%;background:var(--accent);color:#1a1305;border:none;
    display:flex;align-items:center;justify-content:center;padding:0;
    box-shadow:0 6px 20px rgba(232,163,61,.35), 0 2px 6px rgba(0,0,0,.4);cursor:pointer;transition:transform .12s ease;
  }
  .fab svg{width:24px;height:24px;display:block;}
  .fab:active{transform:scale(.92);}

  .backdrop{
    position:fixed;inset:0;background:rgba(6,5,3,.6);backdrop-filter:blur(2px);
    display:flex;align-items:flex-end;justify-content:center;
    opacity:0;pointer-events:none;transition:opacity .2s ease;z-index:50;
  }
  .backdrop.open{opacity:1;pointer-events:auto;}
  .sheet{
    width:100%;max-width:640px;background:var(--surface);border-radius:20px 20px 0 0;
    border:1px solid var(--border);border-bottom:none;padding:20px 18px calc(24px + env(safe-area-inset-bottom));
    transform:translateY(100%);transition:transform .25s cubic-bezier(.32,.72,0,1);
    max-height:85vh;overflow-y:auto;
  }
  .backdrop.open .sheet{transform:translateY(0);}
  .sheet h2{font-family:'JetBrains Mono',monospace;font-size:16px;margin:0 0 16px;color:var(--text);}
  .field{margin-bottom:14px;}
  .field label{display:block;font-size:12px;color:var(--text-dim);margin-bottom:6px;font-weight:500;}
  .field input, .field textarea{
    width:100%;background:var(--surface-2);border:1px solid var(--border);color:var(--text);
    border-radius:10px;padding:11px 12px;font-size:14px;outline:none;font-family:'Inter',sans-serif;resize:none;
  }
  .field textarea{font-family:'JetBrains Mono',monospace;font-size:13.5px;color:var(--accent-bright);min-height:70px;}
  .field input:focus, .field textarea:focus{border-color:var(--accent);}
  .sheet-actions{display:flex;gap:10px;margin-top:6px;}
  .sheet-actions button{flex:1;padding:13px;border-radius:10px;border:none;font-size:14px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;}
  .btn-cancel{background:var(--surface-2);color:var(--text-dim);}
  .btn-save{background:var(--accent);color:#1a1305;}
  .btn-save:active, .btn-cancel:active{transform:scale(.98);}

  .topbtns{display:flex;gap:8px;}
  .iconbtn{
    background:var(--surface);border:1px solid var(--border);color:var(--text-dim);width:34px;height:34px;
    border-radius:9px;display:flex;align-items:center;justify-content:center;cursor:pointer;
  }
  .iconbtn svg{width:15px;height:15px;}
  #fileImport{display:none;}

  .lockscreen{
    position:fixed;inset:0;background:var(--bg);z-index:200;overflow-y:auto;
    display:flex;flex-direction:column;align-items:center;justify-content:center;padding:28px;text-align:center;
  }
  .lockscreen .icon{
    width:52px;height:52px;border-radius:16px;background:var(--surface);border:1px solid var(--border);
    display:flex;align-items:center;justify-content:center;margin-bottom:18px;color:var(--accent);
  }
  .lockscreen .icon svg{width:24px;height:24px;}
  .lockscreen h2{font-family:'JetBrains Mono',monospace;font-size:18px;margin:0 0 8px;}
  .lockscreen p{color:var(--text-dim);font-size:13px;max-width:300px;margin:0 0 20px;line-height:1.55;}
  .lockscreen input{
    width:100%;max-width:280px;background:var(--surface-2);border:1px solid var(--border);color:var(--text);
    border-radius:10px;padding:12px 14px;font-size:15px;margin-bottom:10px;outline:none;text-align:center;
    font-family:'JetBrains Mono',monospace;
  }
  .lockscreen input:focus{border-color:var(--accent);}
  .lockscreen button.primary{
    width:100%;max-width:280px;padding:13px;border-radius:10px;border:none;background:var(--accent);
    color:#1a1305;font-weight:700;font-size:14px;cursor:pointer;margin-top:4px;
  }
  .lockscreen .err{color:var(--danger);font-size:12.5px;margin-top:10px;min-height:16px;}
  .lockscreen .hint{color:var(--text-dim);font-size:11px;margin-top:22px;line-height:1.6;max-width:290px;}
  .settingsblock{width:100%;max-width:280px;text-align:left;}
  .settingsblock label{display:block;font-size:11.5px;color:var(--text-dim);margin:14px 0 6px;font-weight:600;}
  .hidden{display:none !important;}

  .toast{
    position:fixed;left:50%;bottom:100px;transform:translateX(-50%) translateY(10px);
    background:var(--surface);border:1px solid var(--border);color:var(--text);padding:11px 18px;
    border-radius:11px;font-size:13px;opacity:0;pointer-events:none;transition:all .25s ease;z-index:90;
    box-shadow:0 6px 20px rgba(0,0,0,.4);max-width:80vw;text-align:center;
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<div class="lockscreen hidden" id="lockScreen"></div>
<div class="toast" id="toast"></div>
<datalist id="categoryList"></datalist>

<div class="wrap" id="mainApp" style="display:none;">
  <header>
    <h1>komennot</h1>
    <div class="topbtns">
      <button class="iconbtn" id="lockBtn" title="Lukitse">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="5" y="11" width="14" height="9" rx="2"/><path d="M8 11V8a4 4 0 018 0v3" stroke-linecap="round"/></svg>
      </button>
      <button class="iconbtn" id="settingsBtn" title="Asetukset">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 11-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 11-2.83-2.83l.06-.06A1.65 1.65 0 005 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 112.83-2.83l.06.06A1.65 1.65 0 009 5a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09A1.65 1.65 0 0015 5a1.65 1.65 0 001.82-.33l.06-.06a2 2 0 112.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
      </button>
      <button class="iconbtn" id="exportBtn" title="Vie salattu varmuuskopio">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3v12m0 0l-4-4m4 4l4-4M4 17v3a1 1 0 001 1h14a1 1 0 001-1v-3" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <button class="iconbtn" id="importBtn" title="Tuo varmuuskopio">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 21V9m0 0l-4 4m4-4l4 4M4 7V4a1 1 0 011-1h14a1 1 0 011 1v3" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <input type="file" id="fileImport" accept="application/json">
    </div>
  </header>

  <div class="search"><input type="text" id="searchInput" placeholder="Hae komentoja..."></div>
  <div class="catchips hidden" id="catChips"></div>

  <div id="list"></div>
</div>

<button class="fab hidden" id="addFab"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6"><path d="M12 5v14M5 12h14" stroke-linecap="round"/></svg></button>

<div class="backdrop" id="backdrop">
  <div class="sheet">
    <h2 id="sheetTitle">Uusi ryhmä</h2>
    <div class="field">
      <label>Otsikko</label>
      <input type="text" id="descInput" placeholder="Esim. Proxmox VE -asennus">
    </div>
    <div class="field">
      <label>Kategoria (valinnainen)</label>
      <input type="text" id="categoryInput" placeholder="Esim. Palvelimet" list="categoryList">
    </div>
    <div class="field">
      <label>Ensimmäinen rivi</label>
      <textarea id="cmdInput" placeholder="bash -c &quot;$(curl -fsSL https://...)&quot;" rows="3"></textarea>
      <div class="kindpicker" id="sheetKindPicker"></div>
      <div class="strengthmeter hidden" id="sheetStrength"><div class="strengthbar"><span></span></div><div class="strengthlabel"></div></div>
    </div>
    <div class="sheet-actions">
      <button class="btn-cancel" id="cancelBtn">Peruuta</button>
      <button class="btn-save" id="saveBtn">Tallenna</button>
    </div>
  </div>
</div>

<script>
/* ---------- Crypto helpers ---------- */
const enc = new TextEncoder();
const dec = new TextDecoder();
const ITERATIONS = 300000;

function bufToB64(buf){
  const bytes = new Uint8Array(buf); let bin = '';
  for(let i=0;i<bytes.length;i++) bin += String.fromCharCode(bytes[i]);
  return btoa(bin);
}
function b64ToBuf(b64){
  const bin = atob(b64); const bytes = new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++) bytes[i] = bin.charCodeAt(i);
  return bytes.buffer;
}
async function deriveKey(password, saltB64, iterations){
  const salt = b64ToBuf(saltB64);
  const baseKey = await crypto.subtle.importKey('raw', enc.encode(password), 'PBKDF2', false, ['deriveKey']);
  return crypto.subtle.deriveKey({ name:'PBKDF2', salt, iterations, hash:'SHA-256' }, baseKey, { name:'AES-GCM', length:256 }, false, ['encrypt','decrypt']);
}
async function encryptStr(key, plaintext){
  const iv = crypto.getRandomValues(new Uint8Array(12));
  const ctBuf = await crypto.subtle.encrypt({name:'AES-GCM', iv}, key, enc.encode(plaintext));
  return { iv: bufToB64(iv), ct: bufToB64(ctBuf) };
}
async function decryptStr(key, {iv, ct}){
  const ptBuf = await crypto.subtle.decrypt({name:'AES-GCM', iv: new Uint8Array(b64ToBuf(iv))}, key, b64ToBuf(ct));
  return dec.decode(ptBuf);
}

/* ---------- Settings (non-sensitive, plaintext) ---------- */
const SETTINGS_KEY = 'komennot_settings_v1';
function getSettings(){
  try{ return { autoLockMinutes: 5, ...JSON.parse(localStorage.getItem(SETTINGS_KEY) || '{}') }; }
  catch(e){ return { autoLockMinutes: 5 }; }
}
function saveSettings(s){ localStorage.setItem(SETTINGS_KEY, JSON.stringify(s)); }
let settings = getSettings();

/* ---------- Vault state ---------- */
const VAULT_KEY = 'komennot_vault_v1';
const LEGACY_V2 = 'komennot_v2';
const LEGACY_V1 = 'komennot_v1';

let vault = null;
let cryptoKey = null;
let groups = [];
let revealedIds = new Set();
let inactivityTimer = null;

function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }

function normalizeCmd(c){ return { id: c.id || uid(), cmd: c.cmd, kind: c.kind || (c.sensitive ? 'password' : 'command') }; }
function normalizeGroup(g){ return { id: g.id || uid(), title: g.title || g.desc || 'Ilman kuvausta', category: g.category || '', created: g.created || Date.now(), commands: (g.commands || []).map(normalizeCmd) }; }

function getLegacyGroups(){
  const v2 = localStorage.getItem(LEGACY_V2);
  if(v2){ try{ return JSON.parse(v2).map(normalizeGroup); }catch(e){} }
  const v1 = localStorage.getItem(LEGACY_V1);
  if(v1){
    try{
      const old = JSON.parse(v1);
      return old.map(it => normalizeGroup({ id: it.id, title: it.desc, created: it.created, commands: [{ cmd: it.cmd, kind:'command' }] }));
    }catch(e){}
  }
  return null;
}

async function saveVault(){
  const payload = await encryptStr(cryptoKey, JSON.stringify(groups));
  vault.data = payload;
  localStorage.setItem(VAULT_KEY, JSON.stringify(vault));
}

function kindPickerHtml(activeKind){
  return Object.keys(kindMeta).map(k => `

function wireKindPicker(containerEl, onChange){
  containerEl.querySelectorAll('button[data-kind]').forEach(btn => {
    btn.addEventListener('click', () => {
      containerEl.querySelectorAll('button[data-kind]').forEach(b => b.classList.remove('active'));

    });
  });

function getSelectedKind(containerEl){

  return active ? active.dataset.kind : 'command';
}

function computeStrength(pw){
  if(!pw) return { score:0, label:'', color:'var(--border)', pct:0 };
  let score = 0;
  if(pw.length >= 8) score++;
  if(pw.length >= 12) score++;
  if(/[a-z]/.test(pw) && /[A-Z]/.test(pw)) score++;
  if(/\d/.test(pw)) score++;
  if(/[^A-Za-z0-9]/.test(pw)) score++;
  const pct = Math.min(score,5)/5*100;
  let label, color;
  if(score <= 1){ label='Heikko'; color='var(--danger)'; }
  else if(score === 2){ label='Kohtalainen'; color='var(--type-command)'; }
  else if(score === 3){ label='Hyvä'; color='var(--ok)'; }
  else { label='Vahva'; color='var(--good)'; }
  return { score, label, color, pct };
}
function wireStrengthMeter(textareaEl, meterEl, kindContainerEl){
  function refresh(){
    const kind = getSelectedKind(kindContainerEl);
    if(kind === 'password'){
      meterEl.classList.remove('hidden');
      const s = computeStrength(textareaEl.value);
      const bar = meterEl.querySelector('.strengthbar span');
      const label = meterEl.querySelector('.strengthlabel');
      bar.style.width = s.pct + '%';
      bar.style.background = s.color;
      label.textContent = s.label;
      label.style.color = s.color;
    } else {
      meterEl.classList.add('hidden');
    }
  }
  textareaEl.addEventListener('input', refresh);
  wireKindPicker(kindContainerEl, refresh);
  refresh();
}

    const ta = listEl.querySelector('.editarea');
    const picker = listEl.querySelector('.editRowKindPicker');
    const meter = listEl.querySelector('.editRowStrength');
    if(ta){ ta.focus(); ta.setSelectionRange(ta.value.length, ta.value.length); }
    if(picker && meter) wireStrengthMeter(ta, meter, picker);
  }
  wireDragHandles();
}

/* ---------- Drag & drop reordering ---------- */
function wireDragHandles(){
  listEl.querySelectorAll('.draghandle').forEach(handle => {
    handle.addEventListener('pointerdown', onDragStart);
  });
}
function getDragAfterElement(container, y){
  const cards = [...container.querySelectorAll('.card:not(.dragging)')];
  return cards.reduce((closest, child) => {
    const box = child.getBoundingClientRect();
    const offset = y - box.top - box.height/2;
    if(offset < 0 && offset > closest.offset) return { offset, element: child };
    return closest;
  }, { offset: -Infinity, element: null }).element;
}
function onDragStart(e){
  const handle = e.currentTarget;
  const card = handle.closest('.card');
  if(!card) return;
  handle.setPointerCapture(e.pointerId);
  card.classList.add('dragging');
  draggingEl = card;

  function onMove(ev){
    const after = getDragAfterElement(listEl, ev.clientY);
    if(after == null) listEl.appendChild(card);
    else listEl.insertBefore(card, after);
  }
  function onUp(){
    card.classList.remove('dragging');
    handle.removeEventListener('pointermove', onMove);
    handle.removeEventListener('pointerup', onUp);
    handle.removeEventListener('pointercancel', onUp);
    const newOrderIds = [...listEl.querySelectorAll('.card')].map(c => c.dataset.id);
    groups.sort((a,b) => newOrderIds.indexOf(a.id) - newOrderIds.indexOf(b.id));
    draggingEl = null;
    saveVault();
  }
  handle.addEventListener('pointermove', onMove);
  handle.addEventListener('pointerup', onUp);
  handle.addEventListener('pointercancel', onUp);
}

/* ---------- New group sheet ---------- */
function openSheet(){
  sheetTitle.textContent = 'Uusi ryhmä';
  descInput.value = '';
  categoryInput.value = '';
  cmdInput.value = '';
  sheetKindPicker.querySelectorAll('button').forEach(b => b.classList.toggle('active', b.dataset.kind === 'command'));
  sheetStrength.classList.add('hidden');
  backdrop.classList.add('open');
  setTimeout(() => descInput.focus(), 200);
}
function closeSheet(){ backdrop.classList.remove('open'); }

document.getElementById('addFab').onclick = openSheet;
document.getElementById('cancelBtn').onclick = closeSheet;
backdrop.addEventListener('click', e => { if(e.target === backdrop) closeSheet(); });

document.getElementById('saveBtn').onclick = async () => {
  const title = descInput.value.trim();
  const category = categoryInput.value.trim();
  const cmd = cmdInput.value.trim();
  if(!cmd){ cmdInput.focus(); return; }
  const kind = getSelectedKind(sheetKindPicker);
  groups.unshift({ id: uid(), title: title || 'Ilman kuvausta', category, created: Date.now(), commands: [{ id: uid(), cmd, kind }] });
  await saveVault(); render(); closeSheet();
};

/* ---------- Group-level copy action ---------- */
async function copyGroupAction(group){
  const username = group.commands.find(c => c.kind === 'username');
  const password = group.commands.find(c => c.kind === 'password');
  if(username && password){
    await copyText(username.cmd);
    vibrate(15);
    showToast('Käyttäjätunnus kopioitu — liitä se nyt');
    setTimeout(async () => {
      await copyText(password.cmd);
      vibrate(15);
      showToast('Salasana kopioitu — liitä se nyt');
      setTimeout(() => copyText(''), 20000);
    }, 4000);
  } else {
    const joined = group.commands.map(c => c.cmd).join('\n');
    await copyText(joined);
    vibrate(15);
    showToast('Koko ryhmä kopioitu leikepöydälle');
  }
}

/* ---------- Event delegation for list ---------- */
listEl.addEventListener('click', async (e) => {
  const copyBtn = e.target.closest('.copybtn');
  const copyGroupBtn = e.target.closest('.copyGroupBtn');
  const renameBtn = e.target.closest('.renameGroup');
  const delGroupBtn = e.target.closest('.delGroup');
  const delRowBtn = e.target.closest('.delRow');
  const editTrigger = e.target.closest('.editTrigger');
  const toggleRevealBtn = e.target.closest('.toggleReveal');
  const showAddRowBtn = e.target.closest('.showAddRow');
  const cancelAddRowBtn = e.target.closest('.cancelAddRow');
  const confirmAddRowBtn = e.target.closest('.confirmAddRow');
  const saveRowBtn = e.target.closest('.saveRow');
  const cancelRowBtn = e.target.closest('.cancelRow');
  const saveTitleBtn = e.target.closest('.saveTitleBtn');
  const cancelTitleBtn = e.target.closest('.cancelTitleBtn');

  if(toggleRevealBtn){
    const cid = toggleRevealBtn.dataset.cid;
    if(revealedIds.has(cid)) revealedIds.delete(cid);
    else{ revealedIds.add(cid); setTimeout(() => { revealedIds.delete(cid); render(); }, 8000); }
    render();
    return;
  }
  if(copyGroupBtn){
    const g = groups.find(x => x.id === copyGroupBtn.dataset.gid);
    if(g) copyGroupAction(g);
    return;
  }
  if(copyBtn){
    const text = decodeURIComponent(copyBtn.dataset.cmd);
    const kind = copyBtn.dataset.kind;
    await copyText(text);
    vibrate(12);
    copyBtn.classList.add('copied');
    copyBtn.innerHTML = checkIcon;
    setTimeout(() => { copyBtn.classList.remove('copied'); copyBtn.innerHTML = copyIcon; }, 1400);
    if(kind === 'password'){ setTimeout(async () => { await copyText(''); }, 20000); }
    return;
  }
  if(renameBtn){ openTitleEdit = renameBtn.dataset.gid; render(); return; }
  if(saveTitleBtn){
    const gid = saveTitleBtn.dataset.gid;
    const g = groups.find(x => x.id === gid);
    const titleField = listEl.querySelector(`.titleInputField[data-gid="${gid}"]`);
    const catField = listEl.querySelector(`.categoryInputField[data-gid="${gid}"]`);
    if(g){
      g.title = titleField.value.trim() || 'Ilman kuvausta';
      g.category = catField.value.trim();
    }
    openTitleEdit = null;
    await saveVault(); render();
    return;
  }
  if(cancelTitleBtn){ openTitleEdit = null; render(); return; }
  if(delGroupBtn){
    if(confirm('Poistetaanko koko ryhmä komentoineen?')){
      groups = groups.filter(g => g.id !== delGroupBtn.dataset.gid);
      await saveVault(); render();
    }
    return;
  }
  if(delRowBtn){
    const g = groups.find(x => x.id === delRowBtn.dataset.gid);
    if(g && g.commands.length === 1){
      if(confirm('Tämä on ryhmän ainoa rivi. Poistetaanko koko ryhmä?')){
        groups = groups.filter(x => x.id !== g.id);
        await saveVault(); render();
      }
      return;
    }
    if(confirm('Poistetaanko tämä rivi?')){
      g.commands = g.commands.filter(c => c.id !== delRowBtn.dataset.cid);
      await saveVault(); render();
    }
    return;
  }
  if(editTrigger){ openEditRow = { groupId: editTrigger.dataset.gid, cmdId: editTrigger.dataset.cid }; render(); return; }
  if(showAddRowBtn){ openAddRowFor = showAddRowBtn.dataset.gid; render(); return; }
  if(cancelAddRowBtn){ openAddRowFor = null; render(); return; }
  if(confirmAddRowBtn){
    const box = confirmAddRowBtn.closest('.newrowbox');
    const text = box.querySelector('.newRowInput').value.trim();
    const kind = getSelectedKind(box.querySelector('.newRowKindPicker'));
    if(!text) return;
    const g = groups.find(x => x.id === confirmAddRowBtn.dataset.gid);
    g.commands.push({ id: uid(), cmd: text, kind });
    openAddRowFor = null;
    await saveVault(); render();
    return;
  }
  if(saveRowBtn){
    const box = saveRowBtn.closest('.cmdbox');
    const text = box.querySelector('.editarea').value.trim();
    if(!text) return;
    const kind = getSelectedKind(box.querySelector('.editRowKindPicker'));
    const g = groups.find(x => x.id === saveRowBtn.dataset.gid);
    const c = g.commands.find(x => x.id === saveRowBtn.dataset.cid);
    c.cmd = text;
    c.kind = kind;
    openEditRow = null;
    await saveVault(); render();
    return;
  }
  if(cancelRowBtn){ openEditRow = null; render(); return; }
});

listEl.addEventListener('keydown', e => {
  if((e.target.classList.contains('titleInputField') || e.target.classList.contains('categoryInputField')) && e.key === 'Enter'){
    e.preventDefault();
    const gid = e.target.dataset.gid;
    listEl.querySelector(`.saveTitleBtn[data-gid="${gid}"]`).click();
  }
});

searchInput.addEventListener('input', render);

document.getElementById('exportBtn').onclick = () => {
  const blob = new Blob([JSON.stringify(vault, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'komennot-holvi-' + new Date().toISOString().slice(0,10) + '.json';
  document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(url);
};

const fileImport = document.getElementById('fileImport');
document.getElementById('importBtn').onclick = () => fileImport.click();
fileImport.onchange = (e) => {
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try{
      const imported = JSON.parse(reader.result);
      if(!imported.salt || !imported.data) throw new Error('bad format');
      if(!confirm('Tämä korvaa nykyisen holvin tuodulla varmuuskopiolla ja lukitsee sovelluksen. Jatketaanko?')) return;
      localStorage.setItem(VAULT_KEY, JSON.stringify(imported));
      vault = imported;
      lockNow();
    }catch(err){
      alert('Tiedoston lukeminen epäonnistui. Varmista että kyseessä on tämän sovelluksen vientitiedosto.');
    }
  };
  reader.readAsText(file);
  fileImport.value = '';
};

initApp();
</script>
